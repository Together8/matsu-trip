<!doctype html><html lang="zh-Hant"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>花費計算</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="css/style.css">
<meta name="theme-color" content="#2f6f73"></head><body>
<script src="js/app.js"></script><script>renderShell('budget.html');</script>
<main class="container"><h1 style="color:var(--main)">💰 花費計算</h1>
<section class="card">
<label>人數</label><input id="people" type="number" min="1" value="5">
<div id="rows"></div>
<div class="actions"><button class="btn primary" onclick="addRow()">新增花費</button><button class="btn" onclick="saveBudget()">儲存</button><button class="btn warn" onclick="resetBudget()">重設</button></div>
<hr><p>總花費</p><div class="total" id="total">NT$0</div><p>平均每人</p><div class="total" id="avg">NT$0</div>
</section></main>
<script>
let rows=[];
function defaultRows(){return [
 ['早餐 Day1',600],['午餐 Day1',1750],['下午茶 Day1',1250],['晚餐 Day1',1750],
 ['南北竿船票',1600],['早餐 Day2',600],['午餐 Day2',1500],['晚餐 Day2',2500],
 ['油資/停車/雜支',1000],['伴手禮',3000]
];}
function renderBudget(){const el=document.getElementById('rows');el.innerHTML=rows.map((r,i)=>`<div class="budget-row"><input value="${r[0]}" onchange="rows[${i}][0]=this.value;calc()"><input type="number" value="${r[1]}" onchange="rows[${i}][1]=Number(this.value);calc()"><button class="btn warn" onclick="rows.splice(${i},1);renderBudget()">×</button></div>`).join('');calc();}
function calc(){const total=rows.reduce((s,r)=>s+Number(r[1]||0),0);const people=Number(document.getElementById('people').value||1);document.getElementById('total').textContent='NT$'+money(total);document.getElementById('avg').textContent='NT$'+money(Math.ceil(total/people));saveBudget(false);}
function addRow(){rows.push(['新增項目',0]);renderBudget();}
function saveBudget(show=true){localStorage.setItem('matsu-budget',JSON.stringify(rows));localStorage.setItem('matsu-people',document.getElementById('people').value);if(show) alert('已儲存');}
function resetBudget(){rows=defaultRows();document.getElementById('people').value=5;renderBudget();}
loadData().then(()=>{rows=JSON.parse(localStorage.getItem('matsu-budget')||'null')||defaultRows();document.getElementById('people').value=localStorage.getItem('matsu-people')||5;document.getElementById('people').oninput=calc;renderBudget();});
</script>

</body></html>
